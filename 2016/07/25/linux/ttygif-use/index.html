        <h2 id="ttygif命令行录制工具"><a href="#ttygif命令行录制工具" class="headerlink" title="ttygif命令行录制工具"></a><strong>ttygif命令行录制工具</strong></h2><blockquote>
<p>ttygif 录制命令行并转换为gif图片</p>
<p>github: <a href="https://github.com/icholy/ttygif" target="_blank" rel="external">https://github.com/icholy/ttygif</a></p>
</blockquote>
<a id="more"></a>
<h2 id="安装【mac】"><a href="#安装【mac】" class="headerlink" title="安装【mac】"></a>安装【mac】</h2><figure class="highlight bash"><table><tr><td class="gutter"><pre><div class="line">1</div></pre></td><td class="code"><pre><div class="line">brew install https://raw.githubusercontent.com/icholy/ttygif/master/ttygif.rb</div></pre></td></tr></table></figure>
<h2 id="开始录制"><a href="#开始录制" class="headerlink" title="开始录制"></a>开始录制</h2><figure class="highlight bash"><table><tr><td class="gutter"><pre><div class="line">1</div></pre></td><td class="code"><pre><div class="line">ttyrec myrecording</div></pre></td></tr></table></figure>
<h2 id="结束录制"><a href="#结束录制" class="headerlink" title="结束录制"></a>结束录制</h2><figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div></pre></td><td class="code"><pre><div class="line">CTRL-D</div></pre></td></tr></table></figure>
<h2 id="转换为gif"><a href="#转换为gif" class="headerlink" title="转换为gif"></a>转换为gif</h2><figure class="highlight bash"><table><tr><td class="gutter"><pre><div class="line">1</div></pre></td><td class="code"><pre><div class="line">ttygif myrecording <span class="_">-f</span></div></pre></td></tr></table></figure>
