<h1 id="java代码"><a href="#java代码" class="headerlink" title="java代码"></a>java代码</h1><figure class="highlight java"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div><div class="line">29</div><div class="line">30</div><div class="line">31</div><div class="line">32</div><div class="line">33</div><div class="line">34</div><div class="line">35</div><div class="line">36</div><div class="line">37</div><div class="line">38</div></pre></td><td class="code"><pre><div class="line"><span class="comment">/**</span></div><div class="line"> * Jetty服务器</div><div class="line"> */</div><div class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">class</span> <span class="title">JettyServer</span> </span>&#123;</div><div class="line">    <span class="keyword">private</span> <span class="keyword">final</span> <span class="keyword">static</span> Logger LOGGER = LoggerFactory.getLogger(JettyServer.class);</div><div class="line">    <span class="comment">/**</span></div><div class="line">     * 运行服务器</div><div class="line">     *</div><div class="line">     * <span class="doctag">@param</span> path 站点路径</div><div class="line">     * <span class="doctag">@param</span> port 运行端口</div><div class="line">     */</div><div class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title">run</span><span class="params">(String path, String port)</span> </span>&#123;</div><div class="line">        Server server = <span class="keyword">new</span> Server();</div><div class="line">        SelectChannelConnector connector = <span class="keyword">new</span> SelectChannelConnector();</div><div class="line">        connector.setPort(Integer.parseInt(port));</div><div class="line">        server.addConnector(connector);</div><div class="line">        <span class="comment">//设置引导页面</span></div><div class="line">        ResourceHandler resource_handler = <span class="keyword">new</span> ResourceHandler();</div><div class="line">        resource_handler.setDirectoriesListed(<span class="keyword">true</span>);</div><div class="line">        resource_handler.setWelcomeFiles(<span class="keyword">new</span> String[]&#123;<span class="string">"index.html"</span>&#125;);</div><div class="line">        <span class="comment">//设置站点路径</span></div><div class="line">        resource_handler.setResourceBase(path);</div><div class="line">        <span class="comment">//设置handler</span></div><div class="line">        HandlerList handlers = <span class="keyword">new</span> HandlerList();</div><div class="line">        handlers.setHandlers(<span class="keyword">new</span> Handler[]&#123;resource_handler, <span class="keyword">new</span> DefaultHandler()&#125;);</div><div class="line">        server.setHandler(handlers);</div><div class="line">        <span class="comment">//打印日志</span></div><div class="line">        LOGGER.info(<span class="string">"Serving out contents of: [&#123;&#125;] on http://localhost:&#123;&#125;/"</span>, path, port);</div><div class="line">        LOGGER.info(<span class="string">"(To stop server hit CTRL-C)"</span>);</div><div class="line">        <span class="comment">//启动</span></div><div class="line">        <span class="keyword">try</span> &#123;</div><div class="line">            server.start();</div><div class="line">            server.join();</div><div class="line">        &#125; <span class="keyword">catch</span> (Exception e) &#123;</div><div class="line">            e.printStackTrace();</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line">&#125;</div></pre></td></tr></table></figure>
