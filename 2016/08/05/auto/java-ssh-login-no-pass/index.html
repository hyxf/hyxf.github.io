pan> (!success) &#123;</div><div class="line">                <span class="keyword">throw</span> <span class="keyword">new</span> IOException(<span class="string">"Authentication failed."</span>);</div><div class="line">            &#125;</div><div class="line">            Session session = connection.openSession();</div><div class="line">            session.execCommand(<span class="string">"ls -l"</span>);</div><div class="line">            InputStream inp = session.getStdout();</div><div class="line">            List&lt;String&gt; results = IOUtils.readLines(inp, <span class="string">"utf-8"</span>);</div><div class="line">            <span class="keyword">for</span> (String line : results) &#123;</div><div class="line">                System.out.println(line);</div><div class="line">            &#125;</div><div class="line">            session.close();</div><div class="line">        &#125; <span class="keyword">catch</span> (IOException e) &#123;</div><div class="line">            e.printStackTrace();</div><div class="line">        &#125; <span class="keyword">finally</span> &#123;</div><div class="line">            connection.close();</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line">&#125;</div></pre></td></tr></table></figure>
