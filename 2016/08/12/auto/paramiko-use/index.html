    <div class="article-entry" itemprop="articleBody">
      
        <blockquote>
<p>SSH api for Python</p>
<p>使用文档：<a href="http://docs.paramiko.org/en/2.0/" target="_blank" rel="external">http://docs.paramiko.org/en/2.0/</a></p>
<p>开源地址：<a href="https://github.com/paramiko/paramiko" target="_blank" rel="external">https://github.com/paramiko/paramiko</a></p>
</blockquote>
<a id="more"></a>
<h1 id="安装"><a href="#安装" class="headerlink" title="安装"></a>安装</h1><figure class="highlight bash"><table><tr><td class="gutter"><pre><div class="line">1</div></pre></td><td class="code"><pre><div class="line">pip install paramiko</div></pre></td></tr></table></figure>
<h1 id="远程执行命令"><a href="#远程执行命令" class="headerlink" title="远程执行命令"></a>远程执行命令</h1><figure class="highlight python"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div></pre></td><td class="code"><pre><div class="line"><span class="keyword">import</span> paramiko</div><div class="line"><span class="comment">###</span></div><div class="line">ssh = paramiko.SSHClient()</div><div class="line">ssh.set_missing_host_key_policy(paramiko.AutoAddPolicy())</div><div class="line">ssh.connect(<span class="string">"xxx.xxx.xxx.xxx"</span>, <span class="number">22</span>, <span class="string">"root"</span>, <span class="string">"xxx"</span>)</div><div class="line">stdin, stdout, stderr = ssh.exec_command(<span class="string">"ls -l"</span>)</div><div class="line"><span class="keyword">for</span> mes <span class="keyword">in</span> stdout.readlines():</div><div class="line">    <span class="keyword">print</span> mes</div><div class="line">ssh.close()</div></pre></td></tr></table></figure>
<p>执行结果</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div></pre></td><td class="code"><pre><div class="line">total 16</div><div class="line">drwxr-xr-x 3 root root 4096 Dec 10  2015 bbs</div><div class="line">drwxr-xr-x 3 root root 4096 Aug  9 12:03 download</div><div class="line">drwxr-xr-x 2 root root 4096 Jan  8  2016 gutils</div><div class="line">drwxr-xr-x 9 root root 4096 Dec  3  2015 soft</div><div class="line">Process finished with <span class="built_in">exit</span> code 0</div></pre></td></tr></table></figure>
<h1 id="文件上传和下载"><a href="#文件上传和下载" class="headerlink" title="文件上传和下载"></a>文件上传和下载</h1><figure class="highlight python"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div></pre></td><td class="code"><pre><div class="line"><span class="keyword">import</span> paramiko</div><div class="line"><span class="comment">###</span></div><div class="line">t = paramiko.Transport((<span class="string">"xxx.xxx.xxx.xxx"</span>, <span class="number">22</span>))</div><div class="line">t.connect(username=<span class="string">"root"</span>, password=<span class="string">"xxx"</span>)</div><div class="line">sftp = paramiko.SFTPClient.from_transport(t)</div><div class="line">remotepath = <span class="string">'/root/api-bucket.js'</span></div><div class="line">localpath = <span class="string">'/Users/qiudongchao/Downloads/api-bucket.js'</span></div><div class="line"><span class="comment">#文件上传</span></div><div class="line">sftp.put(localpath, remotepath)</div><div class="line"><span class="comment">#文件下载</span></div><div class="line">sftp.get(remotepath, localpath)</div><div class="line">t.close()</div></pre></td></tr></table></figure>
<p>执行结果<br><figure class="highlight bash"><table><tr><td class="gutter"><pre><div class="line">1</div></pre></td><td class="code"><pre><div class="line">Process finished with <span class="built_in">exit</span> code 0</div></pre></td></tr></table></figure></p>
